<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axeon Media — Axeon Media Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --card: #0c0c14;
      --accent: #6366f1;
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, transparent 50%);
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      text-align: center;
    }

    .brand-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4));
    }

    .logo {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 40px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .logo span { color: var(--accent); }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    input[type="text"] {
      width: 100%;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      color: #fff;
      font-size: 15px;
      text-align: center;
      margin-bottom: 20px;
      transition: border 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      width: 100%;
      display: block;
      padding: 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--accent);
      color: white;
      border: none;
    }

    button:hover {
      background: #4f46e5;
      transform: translateY(-1px);
    }

    button:disabled { opacity: 0.6; cursor: not-allowed; }

    #statusBox {
      margin-top: 24px;
      display: none;
      animation: fadeIn 0.4s ease forwards;
    }

    .status-msg {
      color: #34d399;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .expiry-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 40px;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.5;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="https://kanza-file-api-files-dev.s3.eu-west-3.amazonaws.com/frontend/logo.png" alt="Axeon Media" class="brand-logo">
    
    <div class="logo">Axeon <span>Media Hub</span></div>

    <div class="header">
      <h1>Vos rendus 3D</h1>
      <p>Entrez votre référence projet pour un téléchargement immédiat.</p>
    </div>

    <div class="card">
      <input type="text" id="fileId" placeholder="Ex: test.txt" autocomplete="off">
      
      <button id="btn" onclick="demanderLien()">
        Lancer le téléchargement
      </button>

      <div id="statusBox">
        <p class="status-msg">✅ Téléchargement démarré</p>
        <div class="expiry-tag">
          <span>🕒</span> Lien sécurisé valable 60 minutes
        </div>
      </div>

      <div id="errorMsg" style="color: #f87171; font-size: 13px; margin-top: 16px; display: none;">
        Référence introuvable.
      </div>
    </div>

    <footer>
      AXEON MEDIA SECURE CLOUD &copy; 2026
    </footer>
  </div>

  <script>
    const API_URL = "https://8t05lg7z0l.execute-api.eu-west-3.amazonaws.com/dev";

    async function demanderLien() {
      const fileId = document.getElementById("fileId").value.trim();
      const btn = document.getElementById("btn");
      const statusBox = document.getElementById("statusBox");
      const errorMsg = document.getElementById("errorMsg");

      if (!fileId) return;

      statusBox.style.display = "none";
      errorMsg.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Sécurisation du lien...";

      try {
        const response = await fetch(`${API_URL}/fichiers/${encodeURIComponent(fileId)}`);
        const data = await response.json();

        if (response.ok && data.download_url) {
          // --- LOGIQUE DE TÉLÉCHARGEMENT AUTO ---
          const link = document.createElement("a");
          link.href = data.download_url;
          
          // L'attribut download aide le navigateur à comprendre qu'il faut enregistrer
          link.setAttribute("download", fileId.split('/').pop());
          
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          
          statusBox.style.display = "block";
          btn.textContent = "Téléchargé";
        } else {
          errorMsg.style.display = "block";
        }
      } catch (e) {
        errorMsg.textContent = "Erreur de connexion à l'API.";
        errorMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        if (btn.textContent !== "Téléchargé") btn.textContent = "Lancer le téléchargement";
      }
    }
  </script>
</body>
</html>
