<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axeon Media — Téléchargement Sécurisé</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --card: #0c0c14;
      --accent: #6366f1;
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
    }

    /* Gradient de fond discret */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, transparent 50%);
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      text-align: center;
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.5px;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    .logo span { color: var(--accent); }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    /* Carte de téléchargement */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    input[type="text"] {
      width: 100%;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      color: #fff;
      font-size: 15px;
      text-align: center;
      margin-bottom: 20px;
      transition: border 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    button:hover {
      background: #4f46e5;
      transform: translateY(-1px);
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Résultat */
    #downloadBox {
      margin-top: 24px;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .download-link {
      display: block;
      background: #fff;
      color: #000;
      text-decoration: none;
      padding: 16px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 12px;
    }

    .notice {
      font-size: 12px;
      color: var(--text-muted);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">Axeon <span>Media</span></div>

    <div class="header">
      <h1>Récupérer vos fichiers</h1>
      <p>Saisissez votre référence client pour accéder à vos rendus 3D.</p>
    </div>

    <div class="card">
      <input type="text" id="fileId" placeholder="Ex: PROJET-VILLA-2026" autocomplete="off">
      
      <button id="btn" onclick="demanderLien()">
        Accéder au téléchargement
      </button>

      <div id="downloadBox">
        <a href="#" class="download-link" id="downloadLink" target="_blank">
          Télécharger le fichier maintenant
        </a>
        <p class="notice">Ce lien est valable pendant 1 heure.</p>
      </div>

      <div id="errorMsg" style="color: #f87171; font-size: 13px; margin-top: 16px; display: none;">
        Référence introuvable. Veuillez vérifier votre code.
      </div>
    </div>

    <footer>
      Transfert sécurisé par Axeon Media Cloud
    </footer>
  </div>

  <script>
    const API_URL = "https://8t05lg7z0l.execute-api.eu-west-3.amazonaws.com/dev";

    async function demanderLien() {
      const fileId = document.getElementById("fileId").value.trim();
      const btn = document.getElementById("btn");
      const downloadBox = document.getElementById("downloadBox");
      const errorMsg = document.getElementById("errorMsg");

      if (!fileId) return;

      downloadBox.style.display = "none";
      errorMsg.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Vérification...";

      try {
        const response = await fetch(`${API_URL}/fichiers/${encodeURIComponent(fileId)}`);
        const data = await response.json();

        if (response.ok && data.download_url) {
          document.getElementById("downloadLink").href = data.download_url;
          downloadBox.style.display = "block";
          btn.style.display = "none";
        } else {
          errorMsg.style.display = "block";
        }
      } catch (e) {
        errorMsg.textContent = "Erreur de connexion. Veuillez réessayer.";
        errorMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        if (btn.style.display !== "none") btn.textContent = "Accéder au téléchargement";
      }
    }
  </script>
</body>
</html>
