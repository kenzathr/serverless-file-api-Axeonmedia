name: Deploiement Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Configuration des credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      # ÉTAPE AJOUTÉE : Préparation du binaire Lambda
      - name: Zipper le code de la Lambda
        run: |
          cd app/backend
          zip -r lambda.zip . 
        # Assure-toi que le chemin app/backend correspond bien à ton dossier de code

      - name: Terraform Init
        run: terraform init
        working-directory: ./infra

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./infra

      - name: Terraform Plan
        run: terraform plan -var="public_key_pem=${{ secrets.PUBLIC_KEY_PEM }}"
        working-directory: ./infra

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var="public_key_pem=${{ secrets.PUBLIC_KEY_PEM }}"
        working-directory: ./infra

      # ÉTAPE AJOUTÉE : Mise à jour du code (Correction du bug fileb://)
      - name: Mise à jour du code Lambda
        if: github.ref == 'refs/heads/main'
        run: |
          aws lambda update-function-code \
            --function-name kanza-file-api-presign \
            --zip-file fileb://app/backend/lambda.zip
